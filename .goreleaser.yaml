# GoReleaser config for the buktio OSS core. This file is OSS-safe: it builds ONLY
# the Apache-2.0 binaries (CLI, API server, S3 metering proxy) from the root Go
# module and is synced verbatim to the public repo. The paid editions
# (cmd/buktio-api-ee, cmd/keygen) and the satellite modules (operators/,
# terraform-provider-buktio — separate go.mod, released from their own repos) are
# deliberately NOT built here.
version: 2
project_name: buktio

before:
  hooks:
    - go mod tidy
    # Build the web static export and embed it into internal/webui/dist so the
    # published buktio-api binaries ship the panel inside a single binary.
    - bash scripts/web-embed.sh

builds:
  # CLI — the primary end-user binary (status/logs/restart/doctor/backup/restore/upgrade/cluster).
  - id: buktio
    main: ./cmd/buktio
    binary: buktio
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

  # API server — published for provenance/checksums; the container image is the primary delivery.
  - id: buktio-api
    main: ./apps/api/cmd/server
    binary: buktio-api
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

  # S3 metering proxy. No `version` var in its main package, so no -X injection.
  - id: buktio-s3proxy
    main: ./cmd/buktio-s3proxy
    binary: buktio-s3proxy
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: default
    ids: [buktio, buktio-api, buktio-s3proxy]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - THIRD-PARTY-LICENSES.md
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Per-archive SBOMs via syft (the release runner must have syft on PATH — the CI
# release job installs it with anchore/sbom-action/download-syft).
sboms:
  - id: archive
    artifacts: archive

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'Merge '
  groups:
    - { title: Features, regexp: '^.*?feat(\(.+\))??!?:.+$', order: 0 }
    - { title: Fixes, regexp: '^.*?fix(\(.+\))??!?:.+$', order: 1 }
    - { title: Performance, regexp: '^.*?perf(\(.+\))??!?:.+$', order: 2 }
    - { title: Others, order: 999 }

# Linux packages (.deb/.rpm) for the CLI. Only the `buktio` CLI is packaged as an
# OS package — the api/s3proxy ship as container images and release archives. This
# lets users `apt install ./buktio_*.deb` / `dnf install ./buktio_*.rpm`.
nfpms:
  - id: buktio-cli
    package_name: buktio
    ids: [buktio]
    vendor: buktio
    homepage: https://buktio.org
    maintainer: buktio maintainers <noreply@buktio.org>
    description: |
      buktio — a free, self-hosted control plane for S3-compatible object storage
      (web panel + REST API + CLI), with Garage as the default hidden engine.
    license: Apache-2.0
    formats: [deb, rpm]
    bindir: /usr/bin
    section: utils
    contents:
      - src: LICENSE
        dst: /usr/share/doc/buktio/LICENSE
      - src: NOTICE
        dst: /usr/share/doc/buktio/NOTICE

release:
  github:
    owner: buktio
    name: buktio
  # Draft so a human reviews and publishes — fits the gated-publish workflow.
  draft: true
  prerelease: auto

# Homebrew tap for the CLI: `brew install buktio/tap/buktio`.
# To ENABLE: (1) create the public repo buktio/homebrew-tap, (2) add a
# HOMEBREW_TAP_GITHUB_TOKEN secret (repo-scoped PAT) to the release workflow env,
# then (3) uncomment this block. Left disabled so releases don't fail before the
# tap exists.
# brews:
#   - name: buktio
#     ids: [default]
#     repository:
#       owner: buktio
#       name: homebrew-tap
#       token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#     homepage: https://buktio.org
#     description: "Self-hosted control plane for S3-compatible object storage (CLI)"
#     license: Apache-2.0
#     skip_upload: auto
#     install: |
#       bin.install "buktio"
#     test: |
#       system "#{bin}/buktio", "--help"
