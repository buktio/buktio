name: ci

# PUBLIC-REPO CI. scripts/sync-public.sh copies this INTO the public snapshot AS
# .github/workflows/ci.yml (and drops the monorepo ci.yml). It is intentionally lean
# and OSS-only — it must never reference the closed paid editions or the signing tool.
#
# Image build/push + GoReleaser live in the monorepo ci.yml (source of truth). They
# are kept out of the public CI until the org's ghcr packages are linked to this repo
# with write access; until then OSS images are published by the maintainer.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)" || (echo 'gofmt needed:'; gofmt -l .; exit 1)
      - run: go build ./...
      - run: go test ./... -short

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
