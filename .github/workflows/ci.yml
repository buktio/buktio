name: ci

# PUBLIC-REPO CI. scripts/sync-public.sh copies this INTO the public snapshot AS
# .github/workflows/ci.yml (and drops the monorepo ci.yml). It is intentionally lean
# and OSS-only — it must never reference the closed paid editions or the signing tool.
#
# go + web run on every push/PR (kept fast and green). The OSS image build/push runs
# only on version tags or manual dispatch — never on ordinary main pushes — and pushes
# from THIS repo's Actions so ghcr connects the packages to the repo. GoReleaser stays
# in the monorepo; public binaries are published by the maintainer.

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)" || (echo 'gofmt needed:'; gofmt -l .; exit 1)
      - run: go build ./...
      - run: go test ./... -short

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # OSS image build & push — tags or manual dispatch only (NOT ordinary main pushes).
  # Pushing from this repo's Actions is what connects the packages to the repo.
  images:
    needs: [go, web]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    strategy:
      fail-fast: false   # one image failing must not cancel the others' push
      # Go images (api/s3proxy) cross-compile natively, so they stay multi-arch.
      # The web image is amd64-only: building Next.js/SWC for linux/arm64 under QEMU
      # emulation SIGILLs the build worker on the amd64 runner. amd64 builds natively.
      matrix:
        include:
          - { image: buktio-api,     dockerfile: build/api.Dockerfile,     platforms: 'linux/amd64,linux/arm64' }
          - { image: buktio-web,     dockerfile: build/web.Dockerfile,     platforms: 'linux/amd64' }
          - { image: buktio-s3proxy, dockerfile: build/s3proxy.Dockerfile, platforms: 'linux/amd64,linux/arm64' }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}' }
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/buktio/${{ matrix.image }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
