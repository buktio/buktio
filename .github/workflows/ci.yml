name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 3 * * *'   # nightly: full E2E + stress + fresh scans (added M-final)
  workflow_dispatch:

env:
  GARAGE_IMAGE: dxflrs/garage:v2.3.0   # single source of truth; never :latest
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)" || (echo 'gofmt needed:'; gofmt -l .; exit 1)
      - uses: golangci/golangci-lint-action@v6
        with: { install-mode: goinstall }

  lint-web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix: { component: [api, cli, s3proxy] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: make build-${{ matrix.component }}

  test-unit:
    needs: [lint-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: go test ./... -race -short -coverprofile=cover.out

  # Integration against a REAL pinned Garage via testcontainers-go. The full suite
  # (golden path + failure scenarios) is added in M-final; the job shape exists now.
  test-integration:
    needs: [test-unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: go test ./... -race -tags=integration -run Integration -timeout 15m
        env: { GARAGE_IMAGE: '${{ env.GARAGE_IMAGE }}' }

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      - uses: gitleaks/gitleaks-action@v2
      - uses: aquasecurity/trivy-action@0.24.0
        with: { scan-type: fs, severity: 'CRITICAL,HIGH', exit-code: '1' }

  # Multi-arch image build & push (main / tags). buktio does NOT build a Garage
  # image — compose/Helm pull the official one by tag, conveying no AGPL object code.
  images:
    needs: [build, test-unit, security]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}' }
      # build-push-action for api + web images is wired in M10 (needs Dockerfiles).

  # Release on tags: GoReleaser (binaries, checksums, SBOM, changelog,
  # THIRD-PARTY-LICENSES). A commented nfpms block reserves future .deb packaging.
  release:
    needs: [images]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write, packages: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - uses: goreleaser/goreleaser-action@v6
        with: { version: latest, args: release --clean }
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
