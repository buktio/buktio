name: ci

# PUBLIC-REPO CI. This file is the canonical workflow for github.com/buktio/buktio.
# scripts/sync-public.sh copies it INTO the public snapshot AS .github/workflows/ci.yml
# (and drops the monorepo ci.yml). It is intentionally lean and OSS-only — it must
# never reference the paid editions (api-ee, keygen) or the satellite modules.
#
# It is intentionally OSS-only and must never build or reference the closed paid
# editions or the license signing tool. In the monorepo this file is excluded from
# the snapshot and does NOT run (the monorepo uses .github/workflows/ci.yml). Keep
# the OSS image/release steps here in sync with the monorepo when they change.

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)" || (echo 'gofmt needed:'; gofmt -l .; exit 1)
      - run: go build ./...
      - run: go test ./... -race -short

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  # Multi-arch OSS image build & push (main / tags) → ghcr.io/buktio/*.
  images:
    needs: [go, web]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    strategy:
      matrix:
        include:
          - { image: buktio-api,     dockerfile: build/api.Dockerfile }
          - { image: buktio-web,     dockerfile: build/web.Dockerfile }
          - { image: buktio-s3proxy, dockerfile: build/s3proxy.Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}' }
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/buktio/${{ matrix.image }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Release on tags: GoReleaser (OSS binaries, checksums, SBOM, changelog). Draft.
  release:
    needs: [images]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write, packages: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: '${{ env.GO_VERSION }}' }
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with: { version: latest, args: release --clean }
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
