name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include secrets
        (KEK, S3 keys, tokens, passwords) in logs or screenshots.
        For security vulnerabilities, do not open a public issue — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I create a bucket, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the panel at ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running buktio?
      options:
        - Full Docker stack (make up / docker compose up --build)
        - Dev mode (infra in Docker, app local)
        - Other (describe below)
    validations:
      required: true
  - type: dropdown
    id: edition
    attributes:
      label: Edition
      options:
        - OSS (free)
        - Pro
        - Enterprise
        - Hosted
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Storage backend
      options:
        - Garage (bundled, default)
        - Garage (existing/external cluster)
        - AWS S3
        - Cloudflare R2
        - Backblaze B2
        - SeaweedFS
        - Ceph RGW
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: buktio version / image tag
      placeholder: e.g. v2.0.0 or commit sha
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output of `make logs` or `docker compose logs`. Redact any secrets.
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: OS, Docker version, browser
