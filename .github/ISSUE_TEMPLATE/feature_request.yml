name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For larger ideas, consider starting a discussion first so we can shape it
        together before any code is written.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Focus on the underlying need, not just a proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like buktio to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Backend involved, screenshots/mockups, links, etc.
