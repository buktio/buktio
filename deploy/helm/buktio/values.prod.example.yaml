# Example production overlay for the buktio chart: a multi-host install with the
# panel, a read-only public demo, and the S3 API on separate hosts behind
# cert-manager TLS. Copy to values.prod.yaml, replace your-domain, and supply the
# secrets out-of-band (--set-file / sealed-secrets / external-secrets) — NEVER commit
# real secret material.
#
#   helm upgrade --install buktio deploy/helm/buktio -n buktio \
#     -f deploy/helm/buktio/values.prod.yaml \
#     --set-file secrets.masterKey=/path/master.key \
#     --set secrets.garageRpcSecret=... --set secrets.garageAdminToken=... \
#     --set secrets.garageMetricsToken=... --set-file secrets.licenseToken=/path/license

# Run the paid-edition image so RBAC can be enforced (required for a read-only demo).
edition: enterprise

image:
  tag: ""   # defaults to the chart appVersion; pin to a released image tag in prod

api:
  s3PublicEndpoint: https://s3.your-domain
  webPublicDomain: web.your-domain

s3proxy:
  enabled: true
  # clusterId: "<uuid>"   # set to the primary cluster id for per-key traffic metering

ingress:
  enabled: true
  className: nginx
  clusterIssuer: letsencrypt-dns   # your cert-manager DNS-01 ClusterIssuer
  # Cloudflare edge ranges — only applied to hosts with cloudflare:true.
  cloudflareSourceRange: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
  hosts:
    - host: app.your-domain     # the panel (proxied/orange)
      service: web
      cloudflare: true
      tls: app-tls
    - host: demo.your-domain    # read-only public demo (proxied/orange)
      service: web
      cloudflare: true
      tls: demo-tls
    - host: s3.your-domain      # S3 API — MUST be DNS-only/gray (SigV4)
      service: s3proxy
      cloudflare: false
      tls: s3-tls

# Read-only public demo (requires edition!=oss + a license with rbac_enforced).
demo:
  enabled: true
  email: demo@your-domain
  password: "change-me-public-demo-password"
  bucket: demo-bucket
  adminEmail: demo-admin@your-domain
  adminPassword: ""   # set for repeatable upgrades; empty = random, first-install only

# For production, prefer a managed Postgres over the bundled StatefulSet:
# postgres: { enabled: false }
# externalDatabase: { url: "postgres://user:pass@host:5432/buktio?sslmode=require" }
