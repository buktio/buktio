apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "buktio.fullname" . }}-web
  labels: {{- include "buktio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels: {{- include "buktio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels: {{- include "buktio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "buktio.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        runAsUser: {{ .Values.web.runAsUser }}
        runAsGroup: {{ .Values.web.runAsUser }}
        fsGroup: {{ .Values.web.runAsUser }}
      containers:
        - name: web
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/{{ .Values.web.image.name }}:{{ include "buktio.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - name: BUKTIO_API_URL
              value: "http://{{ include "buktio.fullname" . }}-api:8080"
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
          # Next.js standalone needs a writable cache/tmp under readOnlyRootFilesystem.
          volumeMounts:
            - { name: cache, mountPath: /app/.next/cache }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: cache, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "buktio.fullname" . }}-web
  labels: {{- include "buktio.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "buktio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - { name: http, port: 3000, targetPort: http }
